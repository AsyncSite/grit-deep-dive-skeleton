services:
  redis:
    image: redis:7.4-alpine
    container_name: gdd-skeleton-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - ""
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 15
